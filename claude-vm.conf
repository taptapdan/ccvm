# =============================================================================
# claude-vm.conf  —  edit this, then re-run ./setup_claude_code to apply
# =============================================================================
# The ONE file you edit. Lists are space-separated inside ( ).
# Re-running setup_claude_code regenerates the VM definition and re-applies
# the in-VM config and the Mac-side proxy allowlist.
# =============================================================================

# ---- VM identity & resources ----------------------------------------------
VM_NAME="claude-dev"
VM_CPUS="4"
VM_MEMORY="8GiB"
VM_DISK="60GiB"

# ---- Mac-side filtering proxy ----------------------------------------------
# Squid runs on your Mac on this port. The VM's only route out is through it.
PROXY_PORT="3128"

# ---- Optional shared folder (a deliberate hole in the wall) ----------------
# A folder on your Mac mounted into the VM at /home/claude/shared.
# Leave "" to share NOTHING (most isolated).
SHARED_DIR=""                 # e.g. "$HOME/code/claude-projects"
SHARED_WRITABLE="true"        # "true" = VM can write; "false" = read-only

# ---- Network allowlist -----------------------------------------------------
# Default-deny. The VM can ONLY reach these domains (enforced by Squid on Mac).
# Convention:  .example.com = domain + all subdomains ; host.example = exact host
#
# PROTECTED: do not remove these or Claude Code will stop working.
PROTECTED_DOMAINS=( \
  "api.anthropic.com" \
  ".anthropic.com" \
  ".claude.ai" \
  ".claude.com" \
  "statsig.com" \
  "sentry.io" \
)

# YOUR development domains. Start narrow; add what your stack needs.
ALLOWED_DOMAINS=( \
  "registry.npmjs.org" \
  ".npmjs.org" \
  "pypi.org" \
  "files.pythonhosted.org" \
  ".github.com" \
  "github.com" \
  "objects.githubusercontent.com" \
  "codeload.github.com" \
  "raw.githubusercontent.com" \
  ".docker.io" \
  "registry-1.docker.io" \
  "auth.docker.io" \
  "production.cloudflare.docker.com" \
  ".googleapis.com" \
  ".gcr.io" \
  ".pkg.dev" \
)

# ---- Ports forwarded from the VM to your Mac -------------------------------
# Label each port:
#   network = bind 0.0.0.0 on your Mac (reachable from other devices on WiFi)
#   local   = bind 127.0.0.1 on your Mac (your Mac only)
FORWARD_PORTS=( \
  "8888:network" \
  "3000:network" \
  "5173:network" \
  "8080:network" \
  "3306:local" \
  "5432:local" \
)

# ---- In-VM dev baseline ----------------------------------------------------
NODE_VERSION="20.19.5"  # pin Node.js version; change here to upgrade
INSTALL_NODE="true"
INSTALL_PYTHON="true"
INSTALL_DOCKER="true"
INSTALL_GCLOUD="false"   # set true if you want the gcloud CLI inside the VM
